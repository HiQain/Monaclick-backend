    <script>
      (() => {
        const phoneInput = document.getElementById('phone');
        if (phoneInput) {
          const formatUsPhone = (raw) => {
            const digits = String(raw || '').replace(/\D/g, '').slice(0, 10);
            if (!digits) return '';
            if (digits.length < 4) return `(${digits}`;
            if (digits.length < 7) return `(${digits.slice(0, 3)}) ${digits.slice(3)}`;
            return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
          };

          phoneInput.addEventListener('input', () => {
            phoneInput.value = formatUsPhone(phoneInput.value);
          });

          phoneInput.addEventListener('blur', () => {
            phoneInput.value = formatUsPhone(phoneInput.value);
          });
        }

        const to24Hour = (raw) => {
          const v = String(raw || '').trim();
          if (!v) return '';
          const m = v.match(/^(\d{1,2}):(\d{2})(?:\s*([AP]M))?$/i);
          if (!m) return '';
          let hh = Number(m[1]);
          const mm = Number(m[2]);
          const ap = String(m[3] || '').toUpperCase();
          if (Number.isNaN(hh) || Number.isNaN(mm) || hh < 0 || hh > 23 || mm < 0 || mm > 59) return '';
          if (ap === 'PM' && hh < 12) hh += 12;
          if (ap === 'AM' && hh === 12) hh = 0;
          return `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
        };

        const buildTimeLabel = (value) => {
          const normalized = to24Hour(value);
          if (!normalized) return value;
          let hour = Number(normalized.slice(0, 2));
          const minute = normalized.slice(3, 5);
          const suffix = hour >= 12 ? 'PM' : 'AM';
          hour = hour % 12;
          if (hour === 0) hour = 12;
          return `${String(hour).padStart(2, '0')}:${minute} ${suffix}`;
        };

        const ensureTimeSelect = (input) => {
          if (!input) return null;
          if (input.tagName === 'SELECT') return input;

          const select = document.createElement('select');
          select.className = input.className.replace('form-control', 'form-select') + ' mc-time-select';
          select.id = input.id;
          select.name = input.name || input.id;
          select.dataset.mcTimeBound = '1';
          select.setAttribute('aria-label', input.getAttribute('aria-label') || input.id || 'Select time');

          const placeholder = document.createElement('option');
          placeholder.value = '';
          placeholder.textContent = 'Select time';
          select.appendChild(placeholder);

          for (let hour = 0; hour < 24; hour += 1) {
            for (let minute = 0; minute < 60; minute += 30) {
              const value = `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
              const option = document.createElement('option');
              option.value = value;
              option.textContent = buildTimeLabel(value);
              select.appendChild(option);
            }
          }

          const normalized = to24Hour(input.value);
          if (normalized) select.value = normalized;
          input.replaceWith(select);
          return select;
        };

        const refreshHoursRow = (day) => {
          const toggle = document.getElementById(day);
          const fromSelect = document.getElementById(`${day}From`);
          const toSelect = document.getElementById(`${day}To`);
          const row = toggle?.closest('.mc-opening-hours-row');
          if (!toggle || !row || !fromSelect || !toSelect) return;

          row.classList.toggle('is-closed', !toggle.checked);
          fromSelect.disabled = !toggle.checked;
          toSelect.disabled = !toggle.checked;
        };

        document.querySelectorAll('.mc-opening-hours-row').forEach((row) => {
          const divider = row.querySelector('span.small');
          if (divider) divider.classList.add('mc-time-divider');
          if (!row.querySelector('.mc-hours-closed')) {
            const closed = document.createElement('span');
            closed.className = 'mc-hours-closed';
            closed.textContent = 'Closed';
            row.appendChild(closed);
          }
        });

        const dayKeys = ['monday','tuesday','wednesday','thursday','friday','saturday','sunday'];
        document.querySelectorAll('input.mc-time-input').forEach(ensureTimeSelect);
        dayKeys.forEach((day) => {
          document.getElementById(day)?.addEventListener('change', () => refreshHoursRow(day));
          refreshHoursRow(day);
        });

        window.__MC_RESTAURANT_HOURS_REFRESH__ = () => {
          dayKeys.forEach((day) => refreshHoursRow(day));
        };
      })();
    </script>
    <script src="/finder/assets/js/theme.min.js"></script>
    <script src="/finder/assets/js/monaclick-global-footer.js?v=20260306-3"></script>
  </body>
