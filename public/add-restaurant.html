  .mc-opening-hours-row .form-check { min-width: 130px; margin: 0; }
  .mc-opening-hours-row .mc-time-input { width: 100%; min-width: 120px; }
  @media (max-width: 991.98px) {
    .mc-opening-hours { max-width: 100%; min-width: 0; }
    .mc-opening-hours-row { grid-template-columns: 120px 1fr auto 1fr; }
  }

</head>
  <body>

    <main class="container py-5">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
        <div>
          <h1 class="display-6 mb-1">Add a Restaurant</h1>
          <p class="text-body-secondary mb-0">Fill out your restaurant profile to start receiving bookings.</p>
        </div></div>

      <form class="card border-0 shadow-sm" action="/submit/restaurant" method="post" enctype="multipart/form-data">
        <input type="hidden" name="_token" value="__CSRF_TOKEN__">
        <div class="card-body p-4 p-md-5">
          <div class="row g-4">
            <div class="col-12">
              <h2 class="h5 mb-0">Basic information</h2>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="restaurantName">Restaurant name</label>
              <input class="form-control" id="restaurantName" name="restaurant_name" type="text" placeholder="Olive & Thyme Bistro" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="cuisineType">Cuisine type</label>
              <select class="form-select" id="cuisineType" name="cuisine_type" required>
                <option value="">Select cuisine</option>
                <option>Italian</option>
                <option>Steakhouse</option>
                <option>Sushi</option>
                <option>Mediterranean</option>
                <option>BBQ</option>
                <option>Family dining</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="priceRange">Price range</label>
              <select class="form-select" id="priceRange" name="price_range">
                <option value="">Select range</option>
                <option value="500">$500</option>
                <option value="1000">$1,000</option>
                <option value="1500">$1,500</option>
                <option value="2000">$2,000</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="seatingCapacity">Seating capacity</label>
              <input class="form-control" id="seatingCapacity" name="seating_capacity" type="number" min="1" placeholder="80">
            </div>

            <div class="col-12 pt-2">
              <h2 class="h5 mb-0">Location</h2>
            </div>
            <div class="col-12">
              <label class="form-label" for="addressLine">Street address</label>
              <input class="form-control" id="addressLine" name="address" type="text" placeholder="123 Main St" required>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="state">State</label>
              <select class="form-select" id="state" name="state" aria-label="State select" required>
                <option value="">Select state</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="city">City</label>
              <select class="form-select" id="city" name="city" aria-label="City select" required>
                <option value="">Select city</option>
              </select>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="zipCode">Zip code</label>
              <input class="form-control" id="zipCode" name="zip_code" type="text" placeholder="75201" required>
              <input type="hidden" id="country" name="country" value="United States">
            </div>

            <div class="col-12 pt-2">
              <h2 class="h5 mb-0">Services and hours</h2>
            </div>
            <div class="col-md-4">
              <div class="form-check"><input class="form-check-input" id="dineIn" name="services[]" value="dine-in" type="checkbox" checked><label class="form-check-label" for="dineIn">Dine-in</label></div>
              <div class="form-check mt-2"><input class="form-check-input" id="takeaway" name="services[]" value="takeaway" type="checkbox"><label class="form-check-label" for="takeaway">Takeaway</label></div>
              <div class="form-check mt-2"><input class="form-check-input" id="delivery" name="services[]" value="delivery" type="checkbox"><label class="form-check-label" for="delivery">Delivery</label></div>
            </div>
            <div class="col-md-4">
              <div class="form-check"><input class="form-check-input" id="reservations" name="services[]" value="reservations" type="checkbox" checked><label class="form-check-label" for="reservations">Reservations</label></div>
              <div class="form-check mt-2"><input class="form-check-input" id="outdoor" name="services[]" value="outdoor-seating" type="checkbox"><label class="form-check-label" for="outdoor">Outdoor seating</label></div>
              <div class="form-check mt-2"><input class="form-check-input" id="familyFriendly" name="services[]" value="family-friendly" type="checkbox"><label class="form-check-label" for="familyFriendly">Family friendly</label></div>
            </div>
            <div class="col-12">
              <label class="form-label d-block">Opening hours (day-wise)</label>
              <input type="hidden" id="openingHoursHidden" name="opening_hours">
              <div class="vstack gap-2 mc-opening-hours">
                <div class="d-flex flex-wrap align-items-center gap-2 mc-opening-hours-row">
                  <div class="form-check form-switch m-0" style="min-width: 130px">
                    <input type="checkbox" class="form-check-input" role="switch" id="monday" checked>
                    <label for="monday" class="form-check-label small">Monday</label>
                  </div>
                  <input type="time" class="form-control form-control-sm mc-time-input" id="mondayFrom" value="09:00">
                  <span class="small">to</span>
                  <input type="time" class="form-control form-control-sm mc-time-input" id="mondayTo" value="17:00">
                </div>
                <div class="d-flex flex-wrap align-items-center gap-2 mc-opening-hours-row">
                  <div class="form-check form-switch m-0" style="min-width: 130px">
                    <input type="checkbox" class="form-check-input" role="switch" id="tuesday" checked>
                    <label for="tuesday" class="form-check-label small">Tuesday</label>
                  </div>
                  <input type="time" class="form-control form-control-sm mc-time-input" id="tuesdayFrom" value="09:00">
                  <span class="small">to</span>
                  <input type="time" class="form-control form-control-sm mc-time-input" id="tuesdayTo" value="17:00">
                </div>
                <div class="d-flex flex-wrap align-items-center gap-2 mc-opening-hours-row">
                  <div class="form-check form-switch m-0" style="min-width: 130px">
                    <input type="checkbox" class="form-check-input" role="switch" id="wednesday" checked>
                    <label for="wednesday" class="form-check-label small">Wednesday</label>
                  </div>
                  <input type="time" class="form-control form-control-sm mc-time-input" id="wednesdayFrom" value="09:00">
                  <span class="small">to</span>
                  <input type="time" class="form-control form-control-sm mc-time-input" id="wednesdayTo" value="17:00">
                </div>
                <div class="d-flex flex-wrap align-items-center gap-2 mc-opening-hours-row">
                  <div class="form-check form-switch m-0" style="min-width: 130px">
                    <input type="checkbox" class="form-check-input" role="switch" id="thursday" checked>
                    <label for="thursday" class="form-check-label small">Thursday</label>
                  </div>
                  <input type="time" class="form-control form-control-sm mc-time-input" id="thursdayFrom" value="11:00">
                  <span class="small">to</span>
                  <input type="time" class="form-control form-control-sm mc-time-input" id="thursdayTo" value="16:00">
                </div>
                <div class="d-flex flex-wrap align-items-center gap-2 mc-opening-hours-row">
                  <div class="form-check form-switch m-0" style="min-width: 130px">
                    <input type="checkbox" class="form-check-input" role="switch" id="friday" checked>
                    <label for="friday" class="form-check-label small">Friday</label>
                  </div>
                  <input type="time" class="form-control form-control-sm mc-time-input" id="fridayFrom" value="11:00">
                  <span class="small">to</span>
                  <input type="time" class="form-control form-control-sm mc-time-input" id="fridayTo" value="16:00">
                </div>
                <div class="d-flex flex-wrap align-items-center gap-2 mc-opening-hours-row">
                  <div class="form-check form-switch m-0" style="min-width: 130px">
                    <input type="checkbox" class="form-check-input" role="switch" id="saturday">
                    <label for="saturday" class="form-check-label small">Saturday</label>
                  </div>
                  <input type="time" class="form-control form-control-sm mc-time-input" id="saturdayFrom">
                  <span class="small">to</span>
                  <input type="time" class="form-control form-control-sm mc-time-input" id="saturdayTo">
                </div>
                <div class="d-flex flex-wrap align-items-center gap-2 mc-opening-hours-row">
                  <div class="form-check form-switch m-0" style="min-width: 130px">
                    <input type="checkbox" class="form-check-input" role="switch" id="sunday">
                    <label for="sunday" class="form-check-label small">Sunday</label>
                  </div>
                  <input type="time" class="form-control form-control-sm mc-time-input" id="sundayFrom">
                  <span class="small">to</span>
                  <input type="time" class="form-control form-control-sm mc-time-input" id="sundayTo">
                </div>
              </div>
            </div>

            <div class="col-12 pt-2">
              <h2 class="h5 mb-0">Media and contact</h2>
            </div>
            <div class="col-12">
              <p class="text-body-secondary small mb-2">Upload photos and videos</p>
              <div class="row row-cols-2 row-cols-sm-3 g-2 g-md-3" data-restaurant-upload-grid>
                <div class="col">
                  <div class="hover-effect-opacity position-relative overflow-hidden rounded">
                    <div class="ratio" style="--fn-aspect-ratio: calc(180 / 268 * 100%)">
                      <img src="/finder/assets/img/add-item/contractor/01.jpg" alt="Image">
                    </div>
                    <div class="hover-effect-target position-absolute top-0 start-0 d-flex align-items-center justify-content-center w-100 h-100 opacity-0">
                      <button type="button" class="btn btn-icon btn-sm btn-light position-relative z-2" aria-label="Remove"><i class="fi-trash fs-base"></i></button>
                      <span class="position-absolute top-0 start-0 w-100 h-100 bg-black bg-opacity-25 z-1"></span>
                    </div>
                  </div>
                </div>
                <div class="col">
                  <div class="hover-effect-opacity position-relative overflow-hidden rounded">
                    <div class="ratio" style="--fn-aspect-ratio: calc(180 / 268 * 100%)">
                      <img src="/finder/assets/img/add-item/contractor/02.jpg" alt="Image">
                    </div>
                    <div class="hover-effect-target position-absolute top-0 start-0 d-flex align-items-center justify-content-center w-100 h-100 opacity-0">
                      <button type="button" class="btn btn-icon btn-sm btn-light position-relative z-2" aria-label="Remove"><i class="fi-trash fs-base"></i></button>
                      <span class="position-absolute top-0 start-0 w-100 h-100 bg-black bg-opacity-25 z-1"></span>
                    </div>
                  </div>
                </div>
                <div class="col">
                  <div class="d-flex align-items-center justify-content-center position-relative h-100 cursor-pointer bg-body-tertiary border border-2 border-dotted rounded p-3" data-restaurant-upload-tile>
                    <div class="text-center">
                      <i class="fi-plus-circle fs-4 text-secondary-emphasis mb-2"></i>
                      <div class="hover-effect-underline fs-sm fw-medium">Upload photos / videos</div>
                    </div>
                  </div>
                </div>
              </div>
              <input class="d-none" id="coverPhoto" name="cover_photo" type="file" accept="image/*">
              <input class="d-none" id="galleryPhotos" name="gallery_photos[]" type="file" accept="image/*,video/*" multiple>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="contactName">Contact person</label>
              <input class="form-control" id="contactName" name="contact_name" type="text" placeholder="John Doe">
            </div>
            <div class="col-md-4">
              <label class="form-label" for="phone">Phone</label>
              <input class="form-control" id="phone" name="phone" type="tel" placeholder="+1 555 123 4567">
            </div>
            <div class="col-md-4">
              <label class="form-label" for="email">Email</label>
              <input class="form-control" id="email" name="email" type="email" placeholder="hello@restaurant.com">
            </div>

            <div class="col-12 d-flex flex-wrap gap-2 justify-content-end pt-2">
              <button class="btn btn-outline-secondary" type="button">Save draft</button>
              <button class="btn btn-primary" type="submit">Submit restaurant listing</button>
            </div>
          </div>
        </div>
      </form>
    </main>

    <script>
      (() => {
        const to24Hour = (raw) => {
          const v = String(raw || '').trim();
          if (!v) return '';
          const m = v.match(/^(\d{1,2}):(\d{2})(?:\s*([AP]M))?$/i);
          if (!m) return '';
          let hh = Number(m[1]);
          const mm = Number(m[2]);
          const ap = String(m[3] || '').toUpperCase();
          if (Number.isNaN(hh) || Number.isNaN(mm) || hh < 0 || hh > 23 || mm < 0 || mm > 59) return '';
          if (ap === 'PM' && hh < 12) hh += 12;
          if (ap === 'AM' && hh === 12) hh = 0;
          return `${String(hh).padStart(2, '0')}:${String(mm).padStart(2, '0')}`;
        };

        const bindTimePicker = (input) => {
          if (input.dataset.mcTimeBound === '1') return;
          input.dataset.mcTimeBound = '1';
          input.type = 'time';
          input.step = '300';

          const normalized = to24Hour(input.value);
          if (normalized) input.value = normalized;

          const openPicker = () => {
            if (typeof input.showPicker === 'function') {
              try { input.showPicker(); } catch (_) {}
            }
          };
          input.addEventListener('pointerdown', openPicker);
          input.addEventListener('focus', openPicker);
        };

        document.querySelectorAll('input.mc-time-input').forEach(bindTimePicker);
      })();
    </script>
    <script src="/finder/assets/js/theme.min.js"></script>
    <script src="/finder/assets/js/monaclick-global-footer.js?v=20260306-3"></script>
