  </head>
  <body>

        <div class="d-flex gap-sm-1 ms-auto">
          <a class="btn btn-icon btn-outline-secondary fs-lg border-0 animate-shake me-2" href="/signin" aria-label="Sign in to account">
            <i class="fi-user animate-target"></i>
          </a>
          <a class="btn btn-primary animate-scale" href="/add-listing">

    <main class="container py-5">
      <div class="d-flex align-items-center justify-content-between flex-wrap gap-3 mb-4">
        <div>
          <h1 class="display-6 mb-1">Add a Restaurant</h1>
          <p class="text-body-secondary mb-0">Fill out your restaurant profile to start receiving bookings.</p>
        </div></div>

      <form class="card border-0 shadow-sm" action="/listings/restaurants" method="get">
        <div class="card-body p-4 p-md-5">
          <div class="row g-4">
            <div class="col-12">
              <h2 class="h5 mb-0">Basic information</h2>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="restaurantName">Restaurant name</label>
              <input class="form-control" id="restaurantName" name="restaurant_name" type="text" placeholder="Olive & Thyme Bistro" required>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="cuisineType">Cuisine type</label>
              <select class="form-select" id="cuisineType" name="cuisine_type" required>
                <option value="">Select cuisine</option>
                <option>Italian</option>
                <option>Steakhouse</option>
                <option>Sushi</option>
                <option>Mediterranean</option>
                <option>BBQ</option>
                <option>Family dining</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="priceRange">Price range</label>
              <select class="form-select" id="priceRange" name="price_range">
                <option value="">Select range</option>
                <option>$</option>
                <option>$$</option>
                <option>$$$</option>
                <option>$$$$</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="seatingCapacity">Seating capacity</label>
              <input class="form-control" id="seatingCapacity" name="seating_capacity" type="number" min="1" placeholder="80">
            </div>

            <div class="col-12 pt-2">
              <h2 class="h5 mb-0">Location</h2>
            </div>
            <div class="col-12">
              <label class="form-label" for="addressLine">Street address</label>
              <input class="form-control" id="addressLine" name="address" type="text" placeholder="123 Main St" required>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="city">City</label>
              <input class="form-control" id="city" name="city" type="text" placeholder="Dallas" required>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="zipCode">Zip code</label>
              <input class="form-control" id="zipCode" name="zip_code" type="text" placeholder="75201" required>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="country">Country</label>
              <input class="form-control" id="country" name="country" type="text" value="United States">
            </div>

            <div class="col-12 pt-2">
              <h2 class="h5 mb-0">Services and hours</h2>
            </div>
            <div class="col-md-4">
              <div class="form-check"><input class="form-check-input" id="dineIn" name="services" type="checkbox" checked><label class="form-check-label" for="dineIn">Dine-in</label></div>
              <div class="form-check mt-2"><input class="form-check-input" id="takeaway" name="services" type="checkbox"><label class="form-check-label" for="takeaway">Takeaway</label></div>
              <div class="form-check mt-2"><input class="form-check-input" id="delivery" name="services" type="checkbox"><label class="form-check-label" for="delivery">Delivery</label></div>
            </div>
            <div class="col-md-4">
              <div class="form-check"><input class="form-check-input" id="reservations" name="services" type="checkbox" checked><label class="form-check-label" for="reservations">Reservations</label></div>
              <div class="form-check mt-2"><input class="form-check-input" id="outdoor" name="services" type="checkbox"><label class="form-check-label" for="outdoor">Outdoor seating</label></div>
              <div class="form-check mt-2"><input class="form-check-input" id="familyFriendly" name="services" type="checkbox"><label class="form-check-label" for="familyFriendly">Family friendly</label></div>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="openingHours">Opening hours</label>
              <textarea class="form-control" id="openingHours" name="opening_hours" rows="4" placeholder="Mon-Fri: 11:00 AM - 11:00 PM&#10;Sat-Sun: 10:00 AM - 12:00 AM"></textarea>
            </div>

            <div class="col-12 pt-2">
              <h2 class="h5 mb-0">Media and contact</h2>
            </div>
            <div class="col-md-6">
              <label class="form-label" for="coverPhoto">Cover photo</label>
              <input class="form-control" id="coverPhoto" name="cover_photo" type="file" accept="image/*">
            </div>
            <div class="col-md-6">
              <label class="form-label" for="galleryPhotos">Gallery photos</label>
              <input class="form-control" id="galleryPhotos" name="gallery_photos" type="file" accept="image/*" multiple>
            </div>
            <div class="col-md-4">
              <label class="form-label" for="contactName">Contact person</label>
              <input class="form-control" id="contactName" name="contact_name" type="text" placeholder="John Doe">
            </div>
            <div class="col-md-4">
              <label class="form-label" for="phone">Phone</label>
              <input class="form-control" id="phone" name="phone" type="tel" placeholder="+1 555 123 4567">
            </div>
            <div class="col-md-4">
              <label class="form-label" for="email">Email</label>
              <input class="form-control" id="email" name="email" type="email" placeholder="hello@restaurant.com">
            </div>

            <div class="col-12 d-flex flex-wrap gap-2 justify-content-end pt-2">
              <button class="btn btn-outline-secondary" type="button">Save draft</button>
              <button class="btn btn-primary" type="submit">Submit restaurant listing</button>
            </div>
          </div>
        </div>
      </form>
    </main>

    <script src="/finder/assets/js/theme.min.js"></script>
    <script src="/finder/assets/js/monaclick-global-footer.js?v=20260305-1"></script>
  </body>
</html>
